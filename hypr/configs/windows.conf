# ============================================================
# Window Rules - Hyprland v0.53+ Syntax (V3)
# See: https://wiki.hyprland.org/Configuring/Window-Rules/
# To inspect window properties:
# hyprctl clients | grep class
# sleep 2; hyprctl layers | grep namespace
# ============================================================

# ---- OPACITY VARIABLES (unchanged) ----
$opacity9 = 0.9 0.9 0.9
$opacity9-1 = 0.9 0.9 1
$opacity9-8-9 = 0.9 0.8 0.9
$opacity8 = 0.8 0.8 0.8
$opacity8-1 = 0.8 0.8 1
$opacity7 = 0.7 0.7 0.7
$opacity7-1 = 0.7 0.7 1


# ============================================================
# PRODUCTIVITY & COMMUNICATION
# ============================================================

# ----- WhatsApp -----
windowrule {
  name = whatsapp-opacity
  match:class = [Ww]hats[Dd]esk
  opacity = $opacity9
}

# ----- Anytype -----
windowrule {
  name = anytype-opacity
  match:class = Anytype|anytype
  opacity = $opacity9
}

# ----- ClickUp -----
windowrule {
  name = clickup-opacity
  match:class = [Cc]lick[Uu]p
  opacity = $opacity8
}

# ----- Obsidian -----
windowrule {
  name = obsidian-opacity
  match:class = [Oo]bsidian
  opacity = $opacity8
}

# ----- Electron -----
windowrule {
  name = electro-opacity
  match:class = electron
  opacity = $opacity8
}

# ============================================================
# TERMINALS
# ============================================================

windowrule {
  name = terminal-kitty-warp
  match:class = kitty|warp-terminal
  opacity = $opacity8
}

windowrule {
  name = terminal-antigravity
  match:class = [Aa]ntigravity
  opacity = $opacity8
}

windowrule {
  name = terminal-alacritty
  match:class = Alacritty
  opacity = $opacity8
}

windowrule {
  name = cool-retro-terminal
  match:class = cool-retro-term
  opacity = $opacity8
}

# windowrule {
#   name = terminal-wezterm
#   match:class = org.wezfurlong.wezterm
#   opacity = $opacity8
# }


# ============================================================
# CODE EDITORS & IDEs
# ============================================================

# ----- VSCode -----
$vscode = VSCode|code-url-handler|[Vv]S[Cc]ode|code

windowrule {
  name = vscode-opacity
  match:class = ^($vscode)$
  opacity = $opacity8
}

windowrule {
  name = vscode-workspace-float
  match:class = codium|codium-url-handler|VSCodium
  match:title = Add Folder to Workspace
  float = on
}

# windowrule {
#   name = vscode-workspace
#   match:class = ^($vscode)$
#   workspace = 2
# }

# ----- Cursor -----
$cursor = cursor|cursor-url-handler|[Cc]ursor

windowrule {
  name = cursor-opacity
  match:class = ^($cursor)$
  opacity = $opacity8
}

# ----- Windsurf -----
windowrule {
  name = windsurf-opacity
  match:class = windsurf
  opacity = $opacity8
}

# ----- JetBrains IDEs -----
$jetbrains = jetbrains-.+

windowrule {
  name = jetbrains-opacity
  match:class = ^($jetbrains)$
  opacity = $opacity9
}

# windowrule {
#   name = jetbrains-workspace
#   match:class = ^($jetbrains)$
#   workspace = 2
# }


# ============================================================
# DATABASE TOOLS
# ============================================================

# ----- DBeaver -----
windowrule {
  name = dbeaver-opacity
  match:class = DBeaver
  opacity = $opacity8
}

# ----- Beekeeper Studio -----
windowrule {
  name = beekeeper-opacity
  match:class = beekeeper-studio
  opacity = $opacity9
}

# ----- MongoDB Compass -----
windowrule {
  name = mongodb-compass-opacity
  match:class = MongoDB Compass
  opacity = $opacity8
}

# ----- Postman -----
windowrule {
  name = postman-opacity
  match:class = [Pp]ostman
  opacity = $opacity8
}


# ============================================================
# WEB BROWSERS
# ============================================================

# ----- Zen Browser -----
windowrule {
  name = zen-browser-opacity
  match:class = [Zz]en
  opacity = $opacity8-1
}

# ----- Brave Browser -----
$browser = [Bb]rave-browser(-beta|-dev|-nightly)?
windowrule {
  name = brave-browser-opacity
  match:class = ^($browser)$
  opacity = $opacity8
}
windowrule {
  name = brave-youtube-opacity
  match:class = ^($browser)$
  match:title = .*[Yy]ou[Tt]ube.*
  opacity = 1 1 1
}

# ----- No Opacity Titles -----
windowrule {
  name = youtube
  match:title = .*[Yy]ou[Tt]ube.*
  opacity = 1 1 1
}
windowrule {
  name = maps
  match:title = .*[Gg]oogle [Mm]aps.*
  opacity = 1 1 1
}
windowrule {
  name = disney
  match:title = .*[Dd]isney.*
  opacity = 1 1 1
}
windowrule {
  name = netflix
  match:title = .*[Nn]et[Ff]lix.*
  opacity = 1 1 1
}
windowrule {
  name = hbo
  match:title = .*HBO Max.*
  opacity = 1 1 1
}

# ============================================================
# MEDIA & MUSIC
# ============================================================

# ----- Tidal -----
windowrule {
  name = tidal-opacity
  match:class = tidal-hifi
  opacity = $opacity9
}


# ============================================================
# EMAIL & MESSAGING
# ============================================================

# ----- Thunderbird -----
$thunderbird = org.mozilla.Thunderbird

windowrule {
  name = thunderbird-opacity
  match:class = ^($thunderbird)$
  opacity = $opacity9-1
}


# ============================================================
# FILE MANAGERS
# ============================================================

# ----- Thunar / Nautilus -----
$thunar = [Tt]hunar|org.gnome.Nautilus

windowrule {
  name = thunar-opacity
  match:class = ^($thunar)$
  opacity = $opacity8
}

windowrule {
  name = thunar-file-progress-center
  match:class = [Tt]hunar
  match:title = File Operation Progress
  center = on
  float = on
}

windowrule {
  name = thunar-confirm-replace-center
  match:class = [Tt]hunar
  match:title = Confirm to replace files
  center = on
  float = on
}


# ============================================================
# SYSTEM UTILITIES
# ============================================================

# ----- PulseAudio -----
windowrule {
  name = pulseaudio-opacity
  match:class = org.pulseaudio.pavucontrol
  opacity = $opacity7
}

# windowrule {
#   name = pulseaudio-center
#   match:class = org.pulseaudio.pavucontrol
#   center = on
# }


# ============================================================
# EDUCATIONAL & MATH
# ============================================================

# ----- GeoGebra -----
windowrule {
  name = geogebra-opacity
  match:class = GeoGebra
  opacity = $opacity8-1
}


# ============================================================
# CHAT & SOCIAL
# ============================================================

# ----- Flare -----
windowrule {
  name = flare-opacity
  match:class = Flare
  opacity = $opacity8-1
}


# ============================================================
# GLOBAL WINDOW BEHAVIORS
# ============================================================

# ----- Picture-in-Picture -----
windowrule {
  name = pip-config
  match:title = ^(Picture-in-Picture)$
  # move = 72% 7%
  # size = 25% 25%
  # pin = on
  float = off
  opacity = 1 1
}

# ----- Idle Inhibit (Fullscreen Apps) -----
windowrule {
  name = idle-inhibit-fullscreen-class
  match:class = ^(*)$
  idle_inhibit = fullscreen
}

windowrule {
  name = idle-inhibit-fullscreen-title
  match:title = ^(*)$
  idle_inhibit = fullscreen
}

windowrule {
  name = idle-inhibit-fullscreen-state
  match:fullscreen = 1
  idle_inhibit = fullscreen
}


# ============================================================
# FLOATING WINDOW RULES
# ============================================================

windowrule {
  name = float-polkit
  match:class = org.kde.polkit-kde-authentication-agent-1
  float = on
}

windowrule {
  name = float-zoom-onedriver
  match:class = [Zz]oom|onedriver|onedriver-launcher
  float = on
}

windowrule {
  name = float-xdg-portal
  match:class = xdg-desktop-portal-gtk
  float = on
}

windowrule {
  name = float-calculator
  match:class = org.gnome.Calculator
  match:title = Calculator
  float = on
}

windowrule {
  name = float-rofi
  match:class = ^([Rr]ofi)$
  float = on
  opacity = 0.9 0.6
}

windowrule {
  name = float-image-viewer
  match:class = ^(eog|org.gnome.Loupe)$
  float = on
}

windowrule {
  name = float-theme-tools
  match:class = ^(nwg-look|qt5ct|qt6ct)$
  float = on
  opacity = 0.9 0.8
}

windowrule {
  name = float-video-players
  match:class = ^(mpv|com.github.rafostar.Clapper)$
  float = on
}

windowrule {
  name = float-network-tools
  match:class = ^(nm-applet|nm-connection-editor|blueman-manager)$
  float = on
}

windowrule {
  name = float-system-monitor
  match:class = ^(gnome-system-monitor|org.gnome.SystemMonitor)$
  float = on
  size = 70% 70%
  opacity = 0.82 0.75
}

windowrule {
  name = float-yad-icon-browser
  match:class = ^(yad)$
  float = on
  opacity = 0.9 0.8
}

windowrule {
  name = float-wifi-hotspot
  match:class = ^(wihotspot(-gui)?)$
  float = on
  size = 70% 70%
}

windowrule {
  name = float-document-viewer
  match:class = ^(evince)$
  float = on
  size = 70% 70%
  opacity = 0.94 0.86
}

windowrule {
  name = float-archive-manager
  match:class = ^(file-roller|org.gnome.FileRoller)$
  float = on
  size = 60% 70%
  opacity = 0.9 0.8
}

windowrule {
  name = float-disk-usage
  match:class = ^([Bb]aobab|org.gnome.[Bb]aobab)$
  float = on
  opacity = 0.94 0.86
}

windowrule {
  name = float-kvantum-manager
  match:title = Kvantum Manager
  float = on
  size = 60% 70%
  opacity = 0.9 0.8
}

windowrule {
  name = float-steam-dialogs
  match:class = ^([Ss]team)$
  match:title = ^((?![Ss]team).*|[Ss]team [Ss]ettings)$
  float = on
}

windowrule {
  name = float-qalculate
  match:class = ^([Qq]alculate-gtk)$
  float = on
}

# windowrule {
#   name = float-whatsapp
#   match:class = ^([Ww]hatsdesk)$
#   float = on
#   size = 60% 70%
# }

windowrule {
  name = float-ferdium
  match:class = ^([Ff]erdium)$
  float = on
  size = 60% 70%
  opacity = 0.9 0.7
}


