# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info
$scripts = $HOME/.config/hypr/scripts

$mod = ALT
$super = SUPER

# Apps
$files = thunar
$term = cool-retro-term #kitty #wezterm #warp-terminal
$code = windsurf #code #cursor
$whatsapp = whatsdesk
$explorer = zen-browser
$android = ~/.local/share/Uts/android-studio/bin/studio.sh
$flare = $scripts/utils/flare

# ---------- Scripts ----------
$mod_shift = $mod SHIFT
bind = $mod_shift, W, exec, clingy wallpaper --random
bind = $mod_shift, B, exec, clingy blur --toggle # Toggle blur settings

$ctrl_alt = CTRL ALT
bind = $ctrl_alt, B, exec, pkill -SIGUSR1 waybar # Toggle hide/show waybar
bind = $ctrl_alt, W, exec, clingy wallpaper --select # Select wallpaper to apply
bind = $ctrl_alt, L, exec, clingy lock
bind = $ctrl_alt, R, exec, clingy refresh # Refresh
bind = $super, V, exec, hyprshade toggle blue-light-vibrance-reading # Vibrance
bind = $super, N, exec, hyprshade toggle blue-light-vibrance-night # Blue light filter
bind = $super, tab, exec, pkill rofi || true && ags -t 'overview'

# ---------- Tools ----------
bind = $super SHIFT CTRL, P, exec, clingy screenshot --area
bind = $mod CTRL, Print, exec, clingy screenshot --now
bind = $ctrl_alt, G, exec, clingy gamemode # animations ON/OFF

# ---------- Launchers ----------
### Rofi ###
bind = $altMod, SPACE, exec, pkill rofi || rofi -show drun
### Flare ###
bind = $ctrl_alt, SPACE, exec, $flare

# ---------- Aplications ----------
bind = $super, C, exec, $code
bind = $super, W, exec, $whatsapp
bind = $super, B, exec, $explorer
bind = $super, A, exec, $android
bind = $super, D, exec, dbeaver
bind = $super, P, exec, postman
bind = $super, E, exec, $files # Launch file manager
bind = $super, M, exec, clingy music # online music
bind = $super, O, exec, obsidian
bind = $super, T, exec, $term

# ---------- Windows manager ----------
bind = $super, Q, killactive,
bind = $mod, F, fullscreen
bind = $mod_shift, F, togglefloating,
bind = $ctrl_alt, Delete, exec, clingy kill-window

# ---------- Resize windows ----------
binde = $mod CTRL, n, resizeactive,-100 0
binde = $mod CTRL, i, resizeactive,100 0
binde = $mod CTRL, u, resizeactive,0 -100
binde = $mod CTRL, e, resizeactive,0 100

# ---------- Move windows (hy3) ----------
bind = $mod SHIFT, n, hy3:movewindow, l
bind = $mod SHIFT, i, hy3:movewindow, r
bind = $mod SHIFT, u, hy3:movewindow, u
bind = $mod SHIFT, e, hy3:movewindow, d

# ---------- Move focus (hy3) ----------
bind = $mod, n, hy3:movefocus, l, warp
bind = $mod, i, hy3:movefocus, r, warp
bind = $mod, u, hy3:movefocus, u, warp
bind = $mod, e, hy3:movefocus, d, warp

# ---------- hy3: Container Management ----------
# Create groups/containers
bind = $mod, g, hy3:makegroup, tab         # Create tabbed container
bind = $mod, v, hy3:makegroup, v           # Create vertical split
bind = $mod, h, hy3:makegroup, h           # Create horizontal split

# Change group type
bind = $mod SHIFT, g, hy3:changegroup, tab # Change to tabs
bind = $mod SHIFT, v, hy3:changegroup, v   # Change to vertical
bind = $mod SHIFT, h, hy3:changegroup, h   # Change to horizontal

# ---------- hy3: Tab Navigation ----------
# bind = $mod, comma, hy3:focustab, l        # Previous tab
# bind = $mod, period, hy3:focustab, r       # Next tab
bind = $mod CTRL, comma, hy3:focustab, b   # First tab
bind = $mod CTRL, period, hy3:focustab, e  # Last tab

# ---------- hy3: Focus Hierarchy ----------
# bind = $mod, r, hy3:changefocus, raise, warp     # Focus parent node
# bind = $mod, l, hy3:changefocus, lower, warp     # Focus child node
bind = $mod, comma, hy3:changefocus, raise, warp     # Focus parent node
bind = $mod, period, hy3:changefocus, lower, warp     # Focus child node

# ---------- Switch workspaces ----------
# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
bind = $mod, code:10, workspace, 1
bind = $mod, code:11, workspace, 2
bind = $mod, code:12, workspace, 3
bind = $mod, code:13, workspace, 4
bind = $mod, code:14, workspace, 5
bind = $mod, code:15, workspace, 6
bind = $mod, code:16, workspace, 7
bind = $mod, code:17, workspace, 8
bind = $mod, code:18, workspace, 9
bind = $mod, code:19, workspace, 10

# Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = $mod SHIFT, code:10, movetoworkspace, 1
bind = $mod SHIFT, code:11, movetoworkspace, 2
bind = $mod SHIFT, code:12, movetoworkspace, 3
bind = $mod SHIFT, code:13, movetoworkspace, 4
bind = $mod SHIFT, code:14, movetoworkspace, 5
bind = $mod SHIFT, code:15, movetoworkspace, 6
bind = $mod SHIFT, code:16, movetoworkspace, 7
bind = $mod SHIFT, code:17, movetoworkspace, 8
bind = $mod SHIFT, code:18, movetoworkspace, 9
bind = $mod SHIFT, code:19, movetoworkspace, 10
bind = $mod SHIFT, bracketleft, movetoworkspace, -1 # brackets [ or ]
bind = $mod SHIFT, bracketright, movetoworkspace, +1

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = $mod CTRL, code:10, movetoworkspacesilent, 1
bind = $mod CTRL, code:11, movetoworkspacesilent, 2
bind = $mod CTRL, code:12, movetoworkspacesilent, 3
bind = $mod CTRL, code:13, movetoworkspacesilent, 4
bind = $mod CTRL, code:14, movetoworkspacesilent, 5
bind = $mod CTRL, code:15, movetoworkspacesilent, 6
bind = $mod CTRL, code:16, movetoworkspacesilent, 7
bind = $mod CTRL, code:17, movetoworkspacesilent, 8
bind = $mod CTRL, code:18, movetoworkspacesilent, 9
bind = $mod CTRL, code:19, movetoworkspacesilent, 10
bind = $mod CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [ or ]
bind = $mod CTRL, bracketright, movetoworkspacesilent, +1

# Workspaces related
bind = $mod, tab, workspace, m+1
bind = $mod SHIFT, tab, workspace, m-1

# Special workspace
bind = $mod_shift, O, movetoworkspace, special
bind = $mod, O, togglespecialworkspace,
