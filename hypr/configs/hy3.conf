# hy3 Plugin Configuration
# i3/sway-style manual tiling with node-based window management
# Documentation: https://github.com/outfoxxed/hy3

plugin {
  hy3 {
    # no_gaps_when_only <int> - hide gaps when only one window visible
    # 0 = disabled (default)
    # 1 = hide gaps when only single window visible
    # 2 = hide gaps when only one window in a group
    no_gaps_when_only = 0

    # node_collapse_policy <int> - behavior when groups become empty
    # 0 = remove when empty and has parent node
    # 1 = remove when empty
    # 2 = never remove (default)
    # 3 = always remove
    node_collapse_policy = 3

    # group_inset <int> - pixel offset for single-window groups
    group_inset = 10

    # tab bar configuration
    tabs {
      # Tab bar dimensions - thin and minimal like your borders
      border_width = 0
      height = 10
      padding = 8
      from_top = true
      radius = 1

      # Text rendering
      render_text = false
      text_center = false
      # text_font = CascadiaCode Nerd Font
      text_height = 8
      text_padding = 12

      # Colors using wallust-generated theme
      # Blurred black background aesthetic
      col.active = $color4
      col.active.border = $color1
      col.inactive = rgba(00000099)
      col.inactive.border = rgba(00000099)
      col.urgent = rgba(A2ADA3FF)
      col.text.active = $foreground
      col.text.urgent = $foreground
      col.text.inactive = $color3
    }

    # autotiling - automatic split direction based on window size
    autotile {
      enable = true
      trigger_width = 800
      trigger_height = 500
    }
  }
}
