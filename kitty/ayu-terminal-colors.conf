# Ayu dark terminal color palette
# Matches Neovim's ayu-vim colorscheme (mirage = false)
# Source: neovim-ayu plugin colors.lua
# This ensures consistent ANSI colors across Neovim terminal and Kitty

# Background & Foreground
background #000000
foreground #BFBDB6
cursor     #BFBDB6

# ANSI 16 colors
color0  #0B0E14   # black (bg)
color1  #F07178   # red (markup)
color2  #AAD94C   # green (string)
color3  #E6B450   # yellow (accent)
color4  #39BAE6   # blue (tag) - used by eza for directories
color5  #D2A6FF   # magenta (constant)
color6  #95E6CB   # cyan (regexp)
color7  #BFBDB6   # white (fg)
color8  #565B66   # bright black (fg_idle)
color9  #D95757   # bright red (error)
color10 #AAD94C   # bright green (string)
color11 #E6B450   # bright yellow (accent)
color12 #39BAE6   # bright blue (tag) - bold variant for eza dirs
color13 #D2A6FF   # bright magenta (constant)
color14 #95E6CB   # bright cyan (regexp)
color15 #636A72   # bright white (comment)
