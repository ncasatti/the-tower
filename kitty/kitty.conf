# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

# Ayu dark terminal colors (matches Neovim colorscheme ANSI palette)
# include ayu-terminal-colors.conf

# wallust-colors (disabled - using ayu colors instead)
# include kitty-colors.conf

# BEGIN_KITTY_FONTS
font_family      family="3270 Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14
modify_font cell_width 105%
modify_font cell_height 2px
# modify_font baseline 3
# END_KITTY_FONTS


background_opacity 1
dynamic_background_opacity 1

confirm_os_window_close 0

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

# Padding horizontal y vertical (top right bottom left)
window_padding_width 15 15 15 15

selection_foreground none
selection_background none

# foreground #dddddd
# background #000000
# cursor #dddddd

# For ssh fix and true color support
term xterm-kitty

shell /usr/bin/env fish


